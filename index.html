<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SheCodes Plus Week 2</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="src/styles.css" />

    <script
      src="https://kit.fontawesome.com/31eb690abd.js"
      crossorigin="anonymous"
    ></script>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="main-content">
        <form class="row g-3" id="city-search">
          <div class="col-auto">
            <input
              type="text"
              class="form-control"
              placeholder="Search a city..."
              autofocus="on"
              id="user-input"
            />
          </div>
          <div class="col-auto">
            <button
              type="submit"
              class="btn btn-primary mb-3 btn-info search-btn"
            >
              Search
            </button>
          </div>
          <div class="col-auto">
            <button
              type="submit"
              class="btn btn-warning mb-3 btn-info location-btn"
            >
              Current Location
            </button>
          </div>
        </form>

        <div class="card">
          <div class="row">
            <div class="col">
              <div class="card-body title">
                <div class="title" id="city-display">City</div>
              </div>
            </div>
            <div class="col">
              <div class="card-body title">
                <div class="title">
                  <span id="temperature">No.</span>°
                  <a href="#" id="celcius-display">C</a>
                  /
                  <a href="#" id="fahrenheit-display">F </a>
                </div>
              </div>
            </div>
          </div>
          <div class="card-body">
            <span id="time-info"> Thursday 23:44, 5 February 2023 </span>
          </div>
        </div>

        <div class="basic-info">
          <ul class="list-group list-group-flush">
            <li class="list-group-item"><strong>Weather:</strong> Rainy</li>
            <li class="list-group-item"><strong>Humidity:</strong> 21%</li>
            <li class="list-group-item"><strong>Speed:</strong> 2.5km/h</li>
          </ul>
        </div>

        <center>
          <div class="row">
            <div class="col">Fri</div>
            <div class="col">Sat</div>
            <div class="col">Sun</div>
            <div class="col">Mon</div>
            <div class="col">Tue</div>
            <div class="col">Wed</div>
          </div>
        </center>

        <center>
          <div class="row">
            <div class="col">
              <i class="fa-solid fa-cloud-sun weather-icon"></i>
            </div>
            <div class="col">
              <i class="fa-solid fa-cloud-showers-heavy weather-icon"></i>
            </div>
            <div class="col">
              <i class="fa-solid fa-cloud-showers-heavy weather-icon"></i>
            </div>
            <div class="col"><i class="fa-solid fa-bolt weather-icon"></i></div>
            <div class="col">
              <i class="fa-solid fa-cloud weather-icon"></i>
            </div>
            <div class="col"><i class="fa-solid fa-sun weather-icon"></i></div>
          </div>
        </center>

        <center>
          <div class="row">
            <div class="col">12° | 53°</div>
            <div class="col">7° | 45°</div>
            <div class="col">5° | 41°</div>
            <div class="col">9° | 48°</div>
            <div class="col">15° | 59°</div>
            <div class="col">14° | 57°</div>
          </div>
        </center>
      </div>
    </div>
    <script src="src/script.js"></script>
  </body>
</html>
